<html lang="en">
<head>
<meta charset="UTF-8">

<title>Family Derby Pool · 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {

–surface-alt: #f0e4cc;
–border: rgba(139, 21, 56, 0.15);

–pot-grad-start: #5c0d24;
–pot-grad-end: #8b1538;

@media (prefers-color-scheme: dark) {

–rose: #d4536f;
–rose-deep: #b03856;
–gold: #d4af5e;
–gold-light: #e8c87a;
–paper: #14080c;
–ink: #f0e4d0;

–ink-faint: rgba(240, 228, 208, 0.5);
–surface: #1f1014;
–surface-alt: #2a161c;
–border: rgba(212, 175, 94, 0.2);
–border-soft: rgba(212, 175, 94, 0.12);
–warning-bg: rgba(212, 175, 94, 0.15);
–warning-text: #e8c87a;
–warning-border: rgba(212, 175, 94, 0.35);
–pot-grad-start: #3a0a18;
–pot-grad-end: #6b1029;
–pot-shadow: rgba(0, 0, 0, 0.5);
–input-bg: #f0e4d0;
–input-text: #5c0d24;

}

html, body {
background: var(–paper);
color: var(–ink);
font-family: -apple-system, BlinkMacSystemFont, “Segoe UI”, Roboto, Helvetica, Arial, sans-serif;
line-height: 1.5;
min-height: 100vh;
overflow-x: hidden;
-webkit-font-smoothing: antialiased;
}
.serif {
font-family: Georgia, “Times New Roman”, Times, serif;
font-style: italic;
}
.container {
max-width: 480px;
margin: 0 auto;
padding: 24px 18px 80px;
}
.header {
text-align: center;
padding: 12px 0 24px;
border-bottom: 1px solid var(–border);
margin-bottom: 28px;
}
.eyebrow {
font-size: 10px;
font-weight: 600;
letter-spacing: 0.25em;
color: var(–gold);
text-transform: uppercase;
margin-bottom: 8px;
}
h1 {
font-family: Georgia, “Times New Roman”, serif;
font-style: italic;
font-weight: 500;
font-size: 34px;
color: var(–rose);
line-height: 1.1;
letter-spacing: -0.01em;
}
.subtitle {
font-family: Georgia, serif;
font-size: 15px;
color: var(–ink-soft);
margin-top: 6px;
font-style: italic;
}
.ornament {
color: var(–gold);
margin-top: 8px;
font-size: 14px;
letter-spacing: 0.4em;
}
.section-label {
font-size: 10px;
font-weight: 600;
letter-spacing: 0.2em;
color: var(–gold);
text-transform: uppercase;

}
.pot-card {
background: linear-gradient(135deg, var(–pot-grad-start), var(–pot-grad-end));
color: var(–pot-text);
border-radius: 14px;
padding: 22px 20px;
margin-bottom: 24px;
box-shadow: 0 8px 24px var(–pot-shadow);
position: relative;
overflow: hidden;
}
.pot-card::before {
content: “”;
position: absolute;
top: -40px;
right: -40px;
width: 140px;
height: 140px;

}
.pot-card .section-label { color: var(–gold-light); }
.pot-row {
display: flex;

}
.pot-row input {
width: 80px;

font-size: 16px;
font-family: Georgia, serif;
font-weight: 600;
background: var(–input-bg);
color: var(–input-text);
border: 1px solid var(–gold);
border-radius: 8px;

}
.pot-row input:focus { outline: 2px solid var(–gold-light); }
.pot-row .label { font-size: 13px; opacity: 0.85; }
.pot-row .total {
font-family: Georgia, serif;
font-style: italic;
font-size: 24px;
font-weight: 600;
margin-left: auto;
color: var(–gold-light);
}
.payouts {
display: grid;
gap: 10px;
}
.payouts.cols-1 { grid-template-columns: 1fr; }
.payouts.cols-2 { grid-template-columns: repeat(2, 1fr); }
.payout {
background: rgba(245, 236, 219, 0.1);
border: 0.5px solid rgba(245, 236, 219, 0.2);
border-radius: 8px;
padding: 12px 10px;
text-align: center;
}
.payout .place {
font-size: 9px;
letter-spacing: 0.15em;
text-transform: uppercase;
opacity: 0.75;
margin-bottom: 4px;
}
.payout .amount {
font-family: Georgia, serif;
font-weight: 600;
font-size: 20px;
color: var(–gold-light);
}
.info-box {
background: var(–surface-alt);
border-left: 3px solid var(–gold);
border-radius: 6px;
padding: 12px 14px;
margin-bottom: 22px;
font-size: 13px;
line-height: 1.55;
color: var(–ink);
}
.info-box strong {
font-family: Georgia, serif;
font-style: italic;
font-size: 15px;
color: var(–rose);
font-weight: 600;
}
textarea {
width: 100%;
padding: 14px;
font-family: -apple-system, BlinkMacSystemFont, sans-serif;
font-size: 14px;
line-height: 1.6;
background: var(–surface);
color: var(–ink);
border: 1px solid var(–border);
border-radius: 10px;
resize: vertical;
min-height: 220px;
-webkit-appearance: none;
}
textarea:focus {
outline: none;
border-color: var(–rose);
box-shadow: 0 0 0 3px var(–redraw-hover);
}
.draw-btn {
width: 100%;
margin-top: 16px;
padding: 16px;
font-family: Georgia, serif;
font-style: italic;

font-size: 20px;

color: var(–cream);

cursor: pointer;

}
.draw-btn:active {

.results {

.results-header {

padding-bottom: 14px;

.results-header h2 {
font-family: Georgia, serif;
font-style: italic;

color: var(–rose);
font-weight: 500;
}
.matchup {
background: var(–surface);
border: 1px solid var(–border-soft);
border-radius: 12px;
padding: 14px 16px;
margin-bottom: 10px;

from { opacity: 0; transform: translateX(-8px); }
to { opacity: 1; transform: translateX(0); }
}
.matchup .player {
font-family: Georgia, serif;
font-size: 19px;
font-weight: 600;
color: var(–rose);
margin-bottom: 8px;
display: flex;

}
.player-num {
font-size: 12px;
font-style: italic;
color: var(–gold);

}
.horse-row {

.horse-name { color: var(–ink); font-weight: 500; }
.horse-odds { color: var(–ink-faint); font-size: 12px; }
.bundle-tag {
display: inline-block;
margin-left: 6px;
padding: 2px 8px;
background: var(–warning-bg);
color: var(–warning-text);
border-radius: 4px;
font-size: 9px;
font-weight: 600;
letter-spacing: 0.1em;
text-transform: uppercase;
vertical-align: middle;
}
.share-card {
background: var(–surface);
border: 1px solid var(–rose);
border-radius: 12px;
padding: 16px;
margin-top: 18px;
text-align: center;
}
.share-card .label {
font-size: 10px;
font-weight: 600;
letter-spacing: 0.2em;
color: var(–gold);
text-transform: uppercase;
margin-bottom: 8px;
}
.share-card p {
font-size: 13px;
color: var(–ink-soft);
margin-bottom: 12px;
line-height: 1.55;
}
.share-btn {
width: 100%;
padding: 14px;
font-family: Georgia, serif;
font-style: italic;
font-weight: 600;
font-size: 17px;
background: var(–rose);
color: var(–cream);
border: none;
border-radius: 10px;

}
.share-btn:active { transform: scale(0.98); }
.share-btn.copied { background: var(–success-text); color: var(–paper); }
.redraw-btn {
width: 100%;
margin-top: 10px;
padding: 12px;
background: transparent;
color: var(–rose);
border: 1px solid var(–rose);
border-radius: 10px;
font-size: 13px;
font-weight: 500;
letter-spacing: 0.05em;
cursor: pointer;
}
.redraw-btn:active { background: var(–redraw-hover); }
.viewing-banner {
background: var(–success-bg);
color: var(–success-text);
border-radius: 8px;
padding: 10px 14px;
margin-bottom: 18px;
font-size: 13px;
text-align: center;
line-height: 1.5;
}
.viewing-banner strong {
font-family: Georgia, serif;
font-style: italic;
font-size: 15px;
}
.footer {
margin-top: 40px;
text-align: center;
font-family: Georgia, serif;
font-style: italic;
font-size: 13px;
color: var(–ink-faint);
}
.error {
color: var(–rose);
background: var(–redraw-hover);
padding: 10px;
border-radius: 8px;
font-size: 13px;
text-align: center;
}
.hidden { display: none !important; }
</style>

<script>
  const horses = [
    {p:1,name:"Renegade",odds:"5-1",num:5},
    {p:2,name:"Albus",odds:"50-1",num:50},
    {p:3,name:"Intrepido",odds:"55-1",num:55},
    {p:4,name:"Litmus Test",odds:"34-1",num:34},
    {p:6,name:"Commandment",odds:"7-1",num:7},
    {p:7,name:"Danon Bourbon",odds:"14-1",num:14},
    {p:8,name:"So Happy",odds:"6-1",num:6},
    {p:9,name:"The Puma",odds:"8-1",num:8},
    {p:10,name:"Wonder Dean",odds:"20-1",num:20},
    {p:11,name:"Incredibolt",odds:"27-1",num:27},
    {p:12,name:"Chief Wallabee",odds:"9-1",num:9},
    {p:14,name:"Potente",odds:"23-1",num:23},
    {p:15,name:"Emerging Market",odds:"11-1",num:11},
    {p:16,name:"Pavlovian",odds:"52-1",num:52},
    {p:17,name:"Six Speed",odds:"40-1",num:40},
    {p:18,name:"Further Ado",odds:"7-1",num:7},
    {p:19,name:"Golden Tempo",odds:"36-1",num:36},
    {p:21,name:"Great White",odds:"29-1",num:29},
    {p:22,name:"Ocelli",odds:"50-1",num:50},
    {p:23,name:"Robusta",odds:"50-1",num:50}
  ];

  const TOTAL_HORSES = horses.length;
  const horseByPost = Object.fromEntries(horses.map(h => [h.p, h]));

  function getPlayerNames() {
    return document.getElementById('names').value
      .split('\n').map(s => s.trim()).filter(Boolean);
  }

  function getPayoutStructure(count) {
    if (count <= 3) {
      return [{ label: 'Winner', pct: 1.0 }];
    }
    return [
      { label: 'Win · 70%', pct: 0.7 },
      { label: 'Place · 30%', pct: 0.3 }
    ];
  }

  function buildEntries(N) {
    const sortedByOdds = [...horses].sort((a, b) => a.num - b.num);

    if (N >= TOTAL_HORSES) {
      return sortedByOdds.map(h => ({ type: 'single', horses: [h] }));
    }

    if (N > TOTAL_HORSES / 2) {
      const numBundles = TOTAL_HORSES - N;
      const numSingles = 2 * N - TOTAL_HORSES;
      const singles = sortedByOdds.slice(0, numSingles);
      const toBundle = sortedByOdds.slice(numSingles);
      const bundles = [];
      for (let i = 0; i < numBundles; i++) {
        bundles.push([toBundle[i], toBundle[toBundle.length - 1 - i]]);
      }
      return [
        ...singles.map(h => ({ type: 'single', horses: [h] })),
        ...bundles.map(b => ({ type: 'bundle', horses: b }))
      ];
    }

    const baseSize = Math.floor(TOTAL_HORSES / N);
    const remainder = TOTAL_HORSES % N;
    const bundleSizes = [];
    for (let i = 0; i < N; i++) {
      bundleSizes.push(i < remainder ? baseSize + 1 : baseSize);
    }
    const bundleArrs = bundleSizes.map(() => []);
    let horseIdx = 0;
    let round = 0;
    while (horseIdx < TOTAL_HORSES) {
      const order = round % 2 === 0
        ? [...Array(N).keys()]
        : [...Array(N).keys()].reverse();
      for (const bundleIdx of order) {
        if (bundleArrs[bundleIdx].length < bundleSizes[bundleIdx] && horseIdx < TOTAL_HORSES) {
          bundleArrs[bundleIdx].push(sortedByOdds[horseIdx]);
          horseIdx++;
        }
      }
      round++;
    }
    return bundleArrs.map(b => ({
      type: b.length > 1 ? 'bundle' : 'single',
      horses: b
    }));
  }

  function describeStrategy(N) {
    if (N === 0) return { title: 'Add players above.', body: '' };
    if (N === 1) return { title: 'Just one player?', body: 'You\'ll get all 20 horses.' };
    if (N >= TOTAL_HORSES) {
      const extra = N - TOTAL_HORSES;
      if (extra === 0) {
        return { title: '20 players, 20 horses.', body: 'Every player gets exactly one horse.' };
      }
      return {
        title: 'Too many players (' + N + ' > 20 horses).',
        body: 'Only 20 players can be assigned a horse. The last ' + extra + ' on the list won\'t have one.'
      };
    }
    if (N > TOTAL_HORSES / 2) {
      const numBundles = TOTAL_HORSES - N;
      const numSingles = 2 * N - TOTAL_HORSES;
      return {
        title: '20 horses → ' + N + ' entries.',
        body: numSingles + ' of the strongest horses run solo. The remaining ' + (2 * numBundles) + ' get paired into ' + numBundles + ' balanced bundles. Every horse has an owner.'
      };
    }
    const baseSize = Math.floor(TOTAL_HORSES / N);
    const remainder = TOTAL_HORSES % N;
    let sizeDesc;
    if (remainder === 0) {
      sizeDesc = N + ' bundles of ' + baseSize + ' horses each';
    } else {
      sizeDesc = remainder + ' bundles of ' + (baseSize + 1) + ' and ' + (N - remainder) + ' bundles of ' + baseSize;
    }
    return {
      title: '20 horses → ' + N + ' bundles.',
      body: sizeDesc + '. Horses are distributed by odds in a snake pattern so every bundle has a mix of favorites and longshots.'
    };
  }

  function updateUI() {
    const buy = Math.max(0, parseInt(document.getElementById('buyin').value) || 0);
    const names = getPlayerNames();
    const count = names.length;
    const pot = buy * count;

    document.getElementById('playerCount').textContent = count;
    document.getElementById('pot').textContent = '$' + pot.toLocaleString();

    const structure = getPayoutStructure(count);
    const payoutsEl = document.getElementById('payouts');
    payoutsEl.className = 'payouts cols-' + structure.length;
    payoutsEl.innerHTML = structure.map(s =>
      '<div class="payout"><div class="place">' + s.label + '</div>' +
      '<div class="amount">$' + Math.round(pot * s.pct).toLocaleString() + '</div></div>'
    ).join('');

    const strat = describeStrategy(count);
    document.getElementById('strategyInfo').innerHTML =
      '<strong>' + strat.title + '</strong> ' + strat.body;
  }

  document.getElementById('buyin').addEventListener('input', updateUI);
  document.getElementById('names').addEventListener('input', updateUI);

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const buf = new Uint32Array(1);
      crypto.getRandomValues(buf);
      const j = buf[0] % (i + 1);
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function encodeDrawToUrl(buyin, assignments) {
    const compact = {
      b: buyin,
      p: assignments.map(a => [
        a.name,
        a.entry ? a.entry.horses.map(h => h.p) : []
      ])
    };
    const json = JSON.stringify(compact);
    return btoa(unescape(encodeURIComponent(json)))
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }

  function decodeDrawFromUrl(hash) {
    try {
      const b64 = hash.replace(/-/g, '+').replace(/_/g, '/');
      const padded = b64 + '='.repeat((4 - b64.length % 4) % 4);
      const json = decodeURIComponent(escape(atob(padded)));
      const data = JSON.parse(json);
      return {
        buyin: data.b,
        assignments: data.p.map(entry => ({
          name: entry[0],
          entry: entry[1].length === 0 ? null : {
            type: entry[1].length > 1 ? 'bundle' : 'single',
            horses: entry[1].map(p => horseByPost[p]).filter(Boolean)
          }
        }))
      };
    } catch (e) {
      return null;
    }
  }

  function renderResults(buyin, assignments, isShared) {
    const pot = buyin * assignments.length;
    const structure = getPayoutStructure(assignments.length);

    let html = '<div class="pot-card">' +
      '<div class="section-label">The Purse</div>' +
      '<div class="pot-row">' +
      '<span class="label">$</span>' +
      '<span style="font-family: Georgia, serif; font-weight: 600; font-size: 20px;">' + buyin + '</span>' +
      '<span class="label">× ' + assignments.length + '</span>' +
      '<span class="total">$' + pot.toLocaleString() + '</span>' +
      '</div>' +
      '<div class="payouts cols-' + structure.length + '">' +
      structure.map(s =>
        '<div class="payout"><div class="place">' + s.label + '</div>' +
        '<div class="amount">$' + Math.round(pot * s.pct).toLocaleString() + '</div></div>'
      ).join('') +
      '</div></div>';

    html += '<div class="results-header"><h2>The Matchups</h2></div>';

    assignments.forEach((a, i) => {
      html += '<div class="matchup" style="animation-delay: ' + (i * 40) + 'ms">' +
        '<div class="player"><span class="player-num">' + (i + 1) + '.</span>' + escapeHtml(a.name) + '</div>';

      if (!a.entry) {
        html += '<div class="horse-row" style="color: var(--ink-faint); font-style: italic;">No horse available.</div>';
      } else {
        const isBundle = a.entry.type === 'bundle';
        a.entry.horses.forEach((h, idx) => {
          const badgeClass = isBundle ? 'bundle' : 'single';
          const tag = (isBundle && idx === 0) ? '<span class="bundle-tag">bundle</span>' : '';
          html += '<div class="horse-row">' +
            '<span class="post-badge ' + badgeClass + '">' + h.p + '</span>' +
            '<span class="horse-name">' + h.name + (idx === 0 ? tag : '') + '</span>' +
            '<span class="horse-odds">' + h.odds + '</span>' +
            '</div>';
        });
      }
      html += '</div>';
    });

    if (!isShared) {
      html += '<div class="share-card">' +
        '<div class="label">Share with the family</div>' +
        '<p>This link encodes the exact matchups above. Anyone who opens it sees the same draw.</p>' +
        '<button class="share-btn" id="shareBtn">Copy share link</button>' +
        '</div>' +
        '<button class="redraw-btn" id="restartBtn">Start over</button>';
    } else {
      html += '<button class="redraw-btn" id="restartBtn">Run a new draw</button>';
    }

    document.getElementById('results').innerHTML = html;

    document.getElementById('restartBtn').addEventListener('click', () => {
      window.location.hash = '';
      window.location.reload();
    });

    if (!isShared) {
      const shareBtn = document.getElementById('shareBtn');
      const code = encodeDrawToUrl(buyin, assignments);
      const url = window.location.origin + window.location.pathname + '#' + code;

      shareBtn.addEventListener('click', async () => {
        try {
          if (navigator.share) {
            await navigator.share({
              title: 'Family Derby Pool',
              text: 'Our 2026 Kentucky Derby pool draw',
              url: url
            });
          } else if (navigator.clipboard) {
            await navigator.clipboard.writeText(url);
            shareBtn.textContent = 'Link copied!';
            shareBtn.classList.add('copied');
            setTimeout(() => {
              shareBtn.textContent = 'Copy share link';
              shareBtn.classList.remove('copied');
            }, 2500);
          } else {
            window.prompt('Copy this link:', url);
          }
        } catch (e) {
          window.prompt('Copy this link:', url);
        }
      });

      window.history.replaceState(null, '', '#' + code);
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function draw() {
    const names = getPlayerNames();
    const buyin = Math.max(0, parseInt(document.getElementById('buyin').value) || 0);

    if (names.length === 0) {
      document.getElementById('results').innerHTML = '<div class="error">Please add at least one player name.</div>';
      return;
    }

    const entries = buildEntries(names.length);
    const shuffledEntries = shuffle(entries);

    const assignments = names.map((name, i) => ({
      name,
      entry: i < shuffledEntries.length ? shuffledEntries[i] : null
    }));

    document.getElementById('setupSection').classList.add('hidden');
    renderResults(buyin, assignments, false);
    document.getElementById('results').scrollIntoView({behavior: 'smooth', block: 'start'});
  }

  document.getElementById('drawBtn').addEventListener('click', draw);

  window.addEventListener('load', () => {
    const hash = window.location.hash.slice(1);
    if (hash) {
      const decoded = decodeDrawFromUrl(hash);
      if (decoded && decoded.assignments && decoded.assignments.length > 0) {
        document.getElementById('setupSection').classList.add('hidden');
        document.getElementById('viewingBanner').classList.remove('hidden');
        renderResults(decoded.buyin, decoded.assignments, true);
        return;
      }
    }
    updateUI();
  });
</script>

</body>
</html>

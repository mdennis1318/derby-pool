<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Family Derby Pool · 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --rose: #8b1538;
    --rose-deep: #5c0d24;
    --cream: #f5ecdb;
    --gold: #b8923a;
    --gold-light: #d4af5e;
    --paper: #faf4e7;
    --ink: #1a0e0a;
    --ink-soft: rgba(26, 14, 10, 0.7);
    --ink-faint: rgba(26, 14, 10, 0.55);
    --surface: #ffffff;
    --surface-alt: #f0e4cc;
    --border: rgba(139, 21, 56, 0.15);
    --border-soft: rgba(139, 21, 56, 0.12);
    --warning-bg: #fae8c8;
    --warning-text: #7a5210;
    --warning-border: rgba(184, 146, 58, 0.4);
    --pot-grad-start: #5c0d24;
    --pot-grad-end: #8b1538;
    --pot-text: #f5ecdb;
    --pot-shadow: rgba(139, 21, 56, 0.15);
    --input-bg: #f5ecdb;
    --input-text: #5c0d24;
    --redraw-hover: rgba(139, 21, 56, 0.05);
    --success-bg: #d4e8d4;
    --success-text: #2d5a2d;
    --detail-bg: rgba(139, 21, 56, 0.04);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --rose: #d4536f;
      --rose-deep: #b03856;
      --gold: #d4af5e;
      --gold-light: #e8c87a;
      --paper: #14080c;
      --ink: #f0e4d0;
      --ink-soft: rgba(240, 228, 208, 0.75);
      --ink-faint: rgba(240, 228, 208, 0.5);
      --surface: #1f1014;
      --surface-alt: #2a161c;
      --border: rgba(212, 175, 94, 0.2);
      --border-soft: rgba(212, 175, 94, 0.12);
      --warning-bg: rgba(212, 175, 94, 0.15);
      --warning-text: #e8c87a;
      --warning-border: rgba(212, 175, 94, 0.35);
      --pot-grad-start: #3a0a18;
      --pot-grad-end: #6b1029;
      --pot-shadow: rgba(0, 0, 0, 0.5);
      --input-bg: #f0e4d0;
      --input-text: #5c0d24;
      --redraw-hover: rgba(212, 83, 111, 0.1);
      --success-bg: rgba(120, 180, 120, 0.15);
      --success-text: #9ed09e;
      --detail-bg: rgba(212, 83, 111, 0.06);
    }
  }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 18px 80px;
  }
  .header {
    text-align: center;
    padding: 12px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    font-weight: 500;
    font-size: 34px;
    color: var(--rose);
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  .subtitle {
    font-family: Georgia, serif;
    font-size: 15px;
    color: var(--ink-soft);
    margin-top: 6px;
    font-style: italic;
  }
  .ornament {
    color: var(--gold);
    margin-top: 8px;
    font-size: 14px;
    letter-spacing: 0.4em;
  }
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .pot-card {
    background: linear-gradient(135deg, var(--pot-grad-start), var(--pot-grad-end));
    color: var(--pot-text);
    border-radius: 14px;
    padding: 22px 20px;
    margin-bottom: 24px;
    box-shadow: 0 8px 24px var(--pot-shadow);
    position: relative;
    overflow: hidden;
  }
  .pot-card::before {
    content: "";
    position: absolute;
    top: -40px;
    right: -40px;
    width: 140px;
    height: 140px;
    background: radial-gradient(circle, rgba(212, 175, 94, 0.18) 0%, transparent 70%);
    border-radius: 50%;
  }
  .pot-card .section-label { color: var(--gold-light); }
  .pot-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 14px;
  }
  .pot-row input {
    width: 80px;
    padding: 8px 10px;
    font-size: 16px;
    font-family: Georgia, serif;
    font-weight: 600;
    background: var(--input-bg);
    color: var(--input-text);
    border: 1px solid var(--gold);
    border-radius: 8px;
    text-align: center;
    -webkit-appearance: none;
  }
  .pot-row input:focus { outline: 2px solid var(--gold-light); }
  .pot-row .label { font-size: 13px; opacity: 0.85; }
  .pot-row .total {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 24px;
    font-weight: 600;
    margin-left: auto;
    color: var(--gold-light);
  }
  .payouts {
    display: grid;
    gap: 10px;
  }
  .payouts.cols-1 { grid-template-columns: 1fr; }
  .payouts.cols-2 { grid-template-columns: repeat(2, 1fr); }
  .payout {
    background: rgba(245, 236, 219, 0.1);
    border: 0.5px solid rgba(245, 236, 219, 0.2);
    border-radius: 8px;
    padding: 12px 10px;
    text-align: center;
  }
  .payout .place {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.75;
    margin-bottom: 4px;
  }
  .payout .amount {
    font-family: Georgia, serif;
    font-weight: 600;
    font-size: 20px;
    color: var(--gold-light);
  }
  .info-box {
    background: var(--surface-alt);
    border-left: 3px solid var(--gold);
    border-radius: 6px;
    padding: 12px 14px;
    margin-bottom: 22px;
    font-size: 13px;
    line-height: 1.55;
    color: var(--ink);
  }
  .info-box strong {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 15px;
    color: var(--rose);
    font-weight: 600;
  }
  textarea {
    width: 100%;
    padding: 14px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    line-height: 1.6;
    background: var(--surface);
    color: var(--ink);
    border: 1px solid var(--border);
    border-radius: 10px;
    resize: vertical;
    min-height: 220px;
    -webkit-appearance: none;
  }
  textarea:focus {
    outline: none;
    border-color: var(--rose);
    box-shadow: 0 0 0 3px var(--redraw-hover);
  }
  .draw-btn {
    width: 100%;
    margin-top: 16px;
    padding: 16px;
    font-family: Georgia, serif;
    font-style: italic;
    font-weight: 600;
    font-size: 20px;
    background: var(--rose-deep);
    color: var(--cream);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 0.02em;
    box-shadow: 0 4px 14px var(--pot-shadow);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .draw-btn:active {
    transform: scale(0.98);
    box-shadow: 0 2px 8px var(--pot-shadow);
  }

  .results {
    margin-top: 28px;
    animation: fadeIn 0.5s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .results-header {
    text-align: center;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .results-header h2 {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 26px;
    color: var(--rose);
    font-weight: 500;
  }
  .matchup {
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    animation: slideIn 0.4s ease-out backwards;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .matchup .player {
    font-family: Georgia, serif;
    font-size: 19px;
    font-weight: 600;
    color: var(--rose);
    margin-bottom: 8px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .player-num {
    font-size: 12px;
    font-style: italic;
    color: var(--gold);
    font-weight: 400;
    min-width: 18px;
  }
  .horse-block {
    margin-top: 8px;
    border-radius: 8px;
    overflow: hidden;
    background: var(--detail-bg);
  }
  .horse-summary {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    cursor: pointer;
    user-select: none;
  }
  .horse-summary:active { background: var(--redraw-hover); }
  .post-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 28px;
    height: 28px;
    padding: 0 8px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
  }
  .post-badge.single {
    background: var(--surface-alt);
    color: var(--rose);
    border: 1px solid var(--border);
  }
  .post-badge.bundle {
    background: var(--warning-bg);
    color: var(--warning-text);
    border: 1px solid var(--warning-border);
  }
  .horse-name {
    color: var(--ink);
    font-weight: 600;
    font-size: 14px;
    flex: 1;
  }
  .horse-odds {
    color: var(--ink-faint);
    font-size: 12px;
    font-weight: 500;
  }
  .chevron {
    color: var(--ink-faint);
    font-size: 11px;
    margin-left: 4px;
    transition: transform 0.2s;
  }
  .horse-block.open .chevron {
    transform: rotate(180deg);
  }
  .horse-details {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .horse-block.open .horse-details {
    max-height: 600px;
  }
  .horse-details-inner {
    padding: 0 14px 14px 14px;
    font-size: 13px;
    line-height: 1.55;
    color: var(--ink-soft);
    border-top: 1px solid var(--border-soft);
    padding-top: 12px;
    margin-top: 4px;
  }
  .horse-meta {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 12px;
    margin-bottom: 10px;
    font-size: 12px;
  }
  .horse-meta dt {
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-size: 10px;
    padding-top: 3px;
  }
  .horse-meta dd {
    color: var(--ink);
    font-weight: 500;
  }
  .horse-story {
    font-style: italic;
    font-family: Georgia, serif;
    color: var(--ink);
    background: var(--surface);
    padding: 10px 12px;
    border-radius: 6px;
    border-left: 2px solid var(--gold);
  }
  .bundle-tag {
    display: inline-block;
    margin-left: 6px;
    padding: 2px 8px;
    background: var(--warning-bg);
    color: var(--warning-text);
    border-radius: 4px;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    vertical-align: middle;
  }
  .share-card {
    background: var(--surface);
    border: 1px solid var(--rose);
    border-radius: 12px;
    padding: 16px;
    margin-top: 18px;
    text-align: center;
  }
  .share-card .label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .share-card p {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 12px;
    line-height: 1.55;
  }
  .share-btn {
    width: 100%;
    padding: 14px;
    font-family: Georgia, serif;
    font-style: italic;
    font-weight: 600;
    font-size: 17px;
    background: var(--rose);
    color: var(--cream);
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }
  .share-btn:active { transform: scale(0.98); }
  .share-btn.copied { background: var(--success-text); color: var(--paper); }
  .redraw-btn {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    background: transparent;
    color: var(--rose);
    border: 1px solid var(--rose);
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
  }
  .redraw-btn:active { background: var(--redraw-hover); }
  .viewing-banner {
    background: var(--success-bg);
    color: var(--success-text);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 18px;
    font-size: 13px;
    text-align: center;
    line-height: 1.5;
  }
  .viewing-banner strong {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 15px;
  }
  .footer {
    margin-top: 40px;
    text-align: center;
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-faint);
  }
  .error {
    color: var(--rose);
    background: var(--redraw-hover);
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    text-align: center;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <div class="eyebrow">152nd Running · May 2, 2026</div>
    <h1>The Family Pool</h1>
    <div class="subtitle">Run for the Roses, drawn fairly</div>
    <div class="ornament">• • •</div>
  </header>

  <div id="viewingBanner" class="viewing-banner hidden">
    <strong>You're viewing a shared draw.</strong><br>
    Tap any horse to learn more about it.
  </div>

  <div id="setupSection">
    <div class="pot-card">
      <div class="section-label">The Purse</div>
      <div class="pot-row">
        <span class="label">$</span>
        <input type="number" id="buyin" value="20" min="1" step="1" inputmode="numeric">
        <span class="label">× <span id="playerCount">14</span></span>
        <span class="total" id="pot">$280</span>
      </div>
      <div class="payouts cols-2" id="payouts"></div>
    </div>

    <div class="info-box" id="strategyInfo">
      <strong>Loading...</strong>
    </div>

    <div>
      <div class="section-label">The Players</div>
      <textarea id="names" placeholder="One name per line">Player 1
Player 2
Player 3
Player 4
Player 5
Player 6
Player 7
Player 8
Player 9
Player 10
Player 11
Player 12
Player 13
Player 14</textarea>
    </div>

    <button class="draw-btn" id="drawBtn">Draw the Horses</button>
  </div>

  <div id="results"></div>

  <div class="footer">Post time · 6:57 p.m. ET · Churchill Downs</div>
</div>

<script>
  // 19-horse field (The Puma scratched morning of 5/2)
  const horses = [
    {p:1,name:"Renegade",odds:"4-1",num:4,
      trainer:"Todd Pletcher",jockey:"Irad Ortiz Jr.",
      story:"The morning-line favorite. A son of Into Mischief who steamrolled the Arkansas Derby in March. Pletcher already has two Derby wins. Ortiz is 0-for-9 at the Derby — could this be the one? Drew the dreaded rail (post 1), where no horse has won since 1986."},
    {p:2,name:"Albus",odds:"30-1",num:30,
      trainer:"Riley Mott",jockey:"Manny Franco",
      story:"A longshot with a magical name. Riley Mott is the son of Hall-of-Famer Bill Mott (who trains Chief Wallabee). A real dark horse pick if you like underdog stories."},
    {p:3,name:"Intrepido",odds:"50-1",num:50,
      trainer:"Jeff Mullins",jockey:"Hector Berrios",
      story:"A 50-1 longshot who finished fourth in the Santa Anita Derby. Name means 'fearless' in Spanish — let's hope he lives up to it."},
    {p:4,name:"Litmus Test",odds:"30-1",num:30,
      trainer:"Bob Baffert",jockey:"Martin Garcia",
      story:"One of two Bob Baffert horses in the field. Baffert is the legendary trainer of Triple Crown winners Justify and American Pharoah, tied with Ben Jones for the most Derby wins ever (6). A win here puts him alone at the top."},
    {p:5,name:"Right to Party",odds:"30-1",num:30,
      trainer:"Brad H. Cox",jockey:"Luis Saez",
      story:"A late entry into the field. Brad Cox is one of the hottest trainers in racing. With a name like 'Right to Party,' you have to root for him."},
    {p:6,name:"Commandment",odds:"6-1",num:6,
      trainer:"Brad H. Cox",jockey:"Luis Saez",
      story:"Co-second-favorite. Won the Florida Derby in March and the Fountain of Youth Stakes in February — that's a serious resume. Trainer Brad Cox is on a tear, and Saez has been close to a Derby win for years."},
    {p:7,name:"Danon Bourbon",odds:"20-1",num:20,
      trainer:"Manabu Ikezoe",jockey:"Atsuya Nishimura",
      story:"The Japanese invader! No Japanese-trained horse has ever won the Kentucky Derby, but several have come close in recent years. International intrigue — perfect rooting horse if you want a story to tell."},
    {p:8,name:"So Happy",odds:"15-1",num:15,
      trainer:"Mark Glatt",jockey:"Mike Smith",
      story:"Won the Santa Anita Derby last month. Jockey Mike Smith is the all-time leader in Derby mounts (28!) and rode Justify to the 2018 Triple Crown. At 60 years old, he's still going. The name alone makes this the most fun horse to cheer for."},
    {p:10,name:"Wonder Dean",odds:"30-1",num:30,
      trainer:"(longshot)",jockey:"(longshot)",
      story:"A 30-1 underdog. If Wonder Dean wins, you're the family hero forever and you'll never let anyone forget it."},
    {p:11,name:"Incredibolt",odds:"20-1",num:20,
      trainer:"(mid-tier)",jockey:"(mid-tier)",
      story:"20-1 odds with a name that sounds like a superhero. Could absolutely strike gold."},
    {p:12,name:"Chief Wallabee",odds:"8-1",num:8,
      trainer:"Bill Mott",jockey:"Junior Alvarado",
      story:"Bill Mott and Junior Alvarado are the dream team — they won last year's Derby AND Belmont with Sovereignty. Could they go back-to-back? Finished 2nd at the Fountain of Youth and 3rd at the Florida Derby. A serious threat."},
    {p:14,name:"Potente",odds:"20-1",num:20,
      trainer:"Bob Baffert",jockey:"(top jockey)",
      story:"Baffert's better-fancied horse. Won the San Felipe Stakes in March and finished 2nd at the Santa Anita Derby. If you've drawn Potente, you have a real shot — Baffert horses are always live."},
    {p:15,name:"Emerging Market",odds:"15-1",num:15,
      trainer:"(mid-tier)",jockey:"Flavien Prat",
      story:"Won the Louisiana Derby in March. Jockey Flavien Prat won the 2019 Derby with Country House and has had multiple top-3 finishes since. Solid mid-tier pick."},
    {p:16,name:"Pavlovian",odds:"30-1",num:30,
      trainer:"(longshot)",jockey:"(longshot)",
      story:"Finished 2nd at the Louisiana Derby. A name that rewards conditioning, perhaps?"},
    {p:17,name:"Six Speed",odds:"50-1",num:50,
      trainer:"(longshot)",jockey:"(longshot)",
      story:"Among the longest shots in the field at 50-1. If Six Speed wins, you're buying the family dinner."},
    {p:18,name:"Further Ado",odds:"6-1",num:6,
      trainer:"(top tier)",jockey:"John Velazquez",
      story:"Co-second-favorite. Won the Blue Grass Stakes last month and the Kentucky Jockey Club Stakes in November. Hall of Fame jockey John Velazquez — a 3-time Derby winner — has the mount. This is a top-tier contender."},
    {p:19,name:"Golden Tempo",odds:"30-1",num:30,
      trainer:"(longshot)",jockey:"(longshot)",
      story:"Finished 3rd at the Louisiana Derby. The kind of name that just sounds like a Derby winner."},
    {p:21,name:"Great White",odds:"50-1",num:50,
      trainer:"(also-eligible)",jockey:"(also-eligible)",
      story:"Drew into the field after a scratch. Massive longshot at 50-1, but the also-eligibles have shocked the world before — Mine That Bird won at 50-1 in 2009!"},
    {p:22,name:"Ocelli",odds:"50-1",num:50,
      trainer:"(also-eligible)",jockey:"(also-eligible)",
      story:"Drew into the field after a scratch. 50-1 longshot. Stranger things have happened on the first Saturday in May."}
  ];

  const TOTAL_HORSES = horses.length;
  const horseByPost = Object.fromEntries(horses.map(h => [h.p, h]));

  function getPlayerNames() {
    return document.getElementById('names').value
      .split('\n').map(s => s.trim()).filter(Boolean);
  }

  function getPayoutStructure(count) {
    if (count <= 3) {
      return [{ label: 'Winner', pct: 1.0 }];
    }
    return [
      { label: 'Win · 70%', pct: 0.7 },
      { label: 'Place · 30%', pct: 0.3 }
    ];
  }

  function buildEntries(N) {
    const sortedByOdds = [...horses].sort((a, b) => a.num - b.num);

    if (N >= TOTAL_HORSES) {
      return sortedByOdds.map(h => ({ type: 'single', horses: [h] }));
    }

    if (N > TOTAL_HORSES / 2) {
      const numBundles = TOTAL_HORSES - N;
      const numSingles = 2 * N - TOTAL_HORSES;
      const singles = sortedByOdds.slice(0, numSingles);
      const toBundle = sortedByOdds.slice(numSingles);
      const bundles = [];
      for (let i = 0; i < numBundles; i++) {
        bundles.push([toBundle[i], toBundle[toBundle.length - 1 - i]]);
      }
      return [
        ...singles.map(h => ({ type: 'single', horses: [h] })),
        ...bundles.map(b => ({ type: 'bundle', horses: b }))
      ];
    }

    const baseSize = Math.floor(TOTAL_HORSES / N);
    const remainder = TOTAL_HORSES % N;
    const bundleSizes = [];
    for (let i = 0; i < N; i++) {
      bundleSizes.push(i < remainder ? baseSize + 1 : baseSize);
    }
    const bundleArrs = bundleSizes.map(() => []);
    let horseIdx = 0;
    let round = 0;
    while (horseIdx < TOTAL_HORSES) {
      const order = round % 2 === 0
        ? [...Array(N).keys()]
        : [...Array(N).keys()].reverse();
      for (const bundleIdx of order) {
        if (bundleArrs[bundleIdx].length < bundleSizes[bundleIdx] && horseIdx < TOTAL_HORSES) {
          bundleArrs[bundleIdx].push(sortedByOdds[horseIdx]);
          horseIdx++;
        }
      }
      round++;
    }
    return bundleArrs.map(b => ({
      type: b.length > 1 ? 'bundle' : 'single',
      horses: b
    }));
  }

  function describeStrategy(N) {
    if (N === 0) return { title: 'Add players above.', body: '' };
    if (N === 1) return { title: 'Just one player?', body: 'You\'ll get all 19 horses.' };
    if (N >= TOTAL_HORSES) {
      const extra = N - TOTAL_HORSES;
      if (extra === 0) {
        return { title: '19 players, 19 horses.', body: 'Every player gets exactly one horse.' };
      }
      return {
        title: 'Too many players (' + N + ' > 19 horses).',
        body: 'Only 19 players can be assigned a horse. The last ' + extra + ' on the list won\'t have one.'
      };
    }
    if (N > TOTAL_HORSES / 2) {
      const numBundles = TOTAL_HORSES - N;
      const numSingles = 2 * N - TOTAL_HORSES;
      return {
        title: '19 horses → ' + N + ' entries.',
        body: numSingles + ' of the strongest horses run solo. The remaining ' + (2 * numBundles) + ' get paired into ' + numBundles + ' balanced bundles. Every horse has an owner.'
      };
    }
    const baseSize = Math.floor(TOTAL_HORSES / N);
    const remainder = TOTAL_HORSES % N;
    let sizeDesc;
    if (remainder === 0) {
      sizeDesc = N + ' bundles of ' + baseSize + ' horses each';
    } else {
      sizeDesc = remainder + ' bundles of ' + (baseSize + 1) + ' and ' + (N - remainder) + ' bundles of ' + baseSize;
    }
    return {
      title: '19 horses → ' + N + ' bundles.',
      body: sizeDesc + '. Horses are distributed by odds in a snake pattern so every bundle has a mix of favorites and longshots.'
    };
  }

  function updateUI() {
    const buy = Math.max(0, parseInt(document.getElementById('buyin').value) || 0);
    const names = getPlayerNames();
    const count = names.length;
    const pot = buy * count;

    document.getElementById('playerCount').textContent = count;
    document.getElementById('pot').textContent = '$' + pot.toLocaleString();

    const structure = getPayoutStructure(count);
    const payoutsEl = document.getElementById('payouts');
    payoutsEl.className = 'payouts cols-' + structure.length;
    payoutsEl.innerHTML = structure.map(s =>
      '<div class="payout"><div class="place">' + s.label + '</div>' +
      '<div class="amount">$' + Math.round(pot * s.pct).toLocaleString() + '</div></div>'
    ).join('');

    const strat = describeStrategy(count);
    document.getElementById('strategyInfo').innerHTML =
      '<strong>' + strat.title + '</strong> ' + strat.body;
  }

  document.getElementById('buyin').addEventListener('input', updateUI);
  document.getElementById('names').addEventListener('input', updateUI);

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const buf = new Uint32Array(1);
      crypto.getRandomValues(buf);
      const j = buf[0] % (i + 1);
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function encodeDrawToUrl(buyin, assignments) {
    const compact = {
      b: buyin,
      p: assignments.map(a => [
        a.name,
        a.entry ? a.entry.horses.map(h => h.p) : []
      ])
    };
    const json = JSON.stringify(compact);
    // Convert UTF-8 string to bytes, then base64 encode
    const bytes = new TextEncoder().encode(json);
    let binary = '';
    for (let i = 0; i < bytes.length; i++) {
      binary += String.fromCharCode(bytes[i]);
    }
    return btoa(binary)
      .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }

  function decodeDrawFromUrl(hash) {
    try {
      const b64 = hash.replace(/-/g, '+').replace(/_/g, '/');
      const padded = b64 + '='.repeat((4 - b64.length % 4) % 4);
      const binary = atob(padded);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      const json = new TextDecoder().decode(bytes);
      const data = JSON.parse(json);
      return {
        buyin: data.b,
        assignments: data.p.map(entry => ({
          name: entry[0],
          entry: entry[1].length === 0 ? null : {
            type: entry[1].length > 1 ? 'bundle' : 'single',
            horses: entry[1].map(p => horseByPost[p]).filter(Boolean)
          }
        }))
      };
    } catch (e) {
      return null;
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function buildHorseBlock(h, isBundle, isFirstInBundle) {
    const badgeClass = isBundle ? 'bundle' : 'single';
    const tag = (isBundle && isFirstInBundle) ? '<span class="bundle-tag">bundle</span>' : '';
    const hasMeta = h.trainer && !h.trainer.startsWith('(');
    const metaHtml = hasMeta
      ? '<dl class="horse-meta">' +
        '<dt>Trainer</dt><dd>' + escapeHtml(h.trainer) + '</dd>' +
        '<dt>Jockey</dt><dd>' + escapeHtml(h.jockey) + '</dd>' +
        '</dl>'
      : '';
    return '<div class="horse-block">' +
      '<div class="horse-summary" onclick="this.parentElement.classList.toggle(\'open\')">' +
        '<span class="post-badge ' + badgeClass + '">' + h.p + '</span>' +
        '<span class="horse-name">' + escapeHtml(h.name) + tag + '</span>' +
        '<span class="horse-odds">' + h.odds + '</span>' +
        '<span class="chevron">▼</span>' +
      '</div>' +
      '<div class="horse-details">' +
        '<div class="horse-details-inner">' +
          metaHtml +
          '<div class="horse-story">' + escapeHtml(h.story) + '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  function renderResults(buyin, assignments, isShared) {
    const pot = buyin * assignments.length;
    const structure = getPayoutStructure(assignments.length);

    let html = '<div class="pot-card">' +
      '<div class="section-label">The Purse</div>' +
      '<div class="pot-row">' +
      '<span class="label">$</span>' +
      '<span style="font-family: Georgia, serif; font-weight: 600; font-size: 20px;">' + buyin + '</span>' +
      '<span class="label">× ' + assignments.length + '</span>' +
      '<span class="total">$' + pot.toLocaleString() + '</span>' +
      '</div>' +
      '<div class="payouts cols-' + structure.length + '">' +
      structure.map(s =>
        '<div class="payout"><div class="place">' + s.label + '</div>' +
        '<div class="amount">$' + Math.round(pot * s.pct).toLocaleString() + '</div></div>'
      ).join('') +
      '</div></div>';

    html += '<div class="info-box" style="margin-bottom: 18px;"><strong>Tap any horse</strong> to see its trainer, jockey, and what makes it worth rooting for.</div>';

    html += '<div class="results-header"><h2>The Matchups</h2></div>';

    assignments.forEach((a, i) => {
      html += '<div class="matchup" style="animation-delay: ' + (i * 40) + 'ms">' +
        '<div class="player"><span class="player-num">' + (i + 1) + '.</span>' + escapeHtml(a.name) + '</div>';

      if (!a.entry) {
        html += '<div style="color: var(--ink-faint); font-style: italic; font-size: 13px;">No horse available.</div>';
      } else {
        const isBundle = a.entry.type === 'bundle';
        a.entry.horses.forEach((h, idx) => {
          html += buildHorseBlock(h, isBundle, idx === 0);
        });
      }
      html += '</div>';
    });

    if (!isShared) {
      html += '<div class="share-card">' +
        '<div class="label">Share with the family</div>' +
        '<p>This link encodes the exact matchups above. Anyone who opens it sees the same draw.</p>' +
        '<button class="share-btn" id="shareBtn">Copy share link</button>' +
        '</div>' +
        '<button class="redraw-btn" id="restartBtn">Start over</button>';
    } else {
      html += '<button class="redraw-btn" id="restartBtn">Run a new draw</button>';
    }

    document.getElementById('results').innerHTML = html;

    document.getElementById('restartBtn').addEventListener('click', () => {
      window.location.hash = '';
      window.location.reload();
    });

    if (!isShared) {
      const shareBtn = document.getElementById('shareBtn');
      const code = encodeDrawToUrl(buyin, assignments);
      const url = window.location.origin + window.location.pathname + '#' + code;

      shareBtn.addEventListener('click', async () => {
        try {
          if (navigator.share) {
            await navigator.share({
              title: 'Family Derby Pool',
              text: 'Our 2026 Kentucky Derby pool draw',
              url: url
            });
          } else if (navigator.clipboard) {
            await navigator.clipboard.writeText(url);
            shareBtn.textContent = 'Link copied!';
            shareBtn.classList.add('copied');
            setTimeout(() => {
              shareBtn.textContent = 'Copy share link';
              shareBtn.classList.remove('copied');
            }, 2500);
          } else {
            window.prompt('Copy this link:', url);
          }
        } catch (e) {
          window.prompt('Copy this link:', url);
        }
      });

      window.history.replaceState(null, '', '#' + code);
    }
  }

  function draw() {
    const names = getPlayerNames();
    const buyin = Math.max(0, parseInt(document.getElementById('buyin').value) || 0);

    if (names.length === 0) {
      document.getElementById('results').innerHTML = '<div class="error">Please add at least one player name.</div>';
      return;
    }

    const entries = buildEntries(names.length);
    const shuffledEntries = shuffle(entries);

    const assignments = names.map((name, i) => ({
      name,
      entry: i < shuffledEntries.length ? shuffledEntries[i] : null
    }));

    document.getElementById('setupSection').classList.add('hidden');
    renderResults(buyin, assignments, false);
    document.getElementById('results').scrollIntoView({behavior: 'smooth', block: 'start'});
  }

  document.getElementById('drawBtn').addEventListener('click', draw);

  window.addEventListener('load', () => {
    const hash = window.location.hash.slice(1);
    if (hash) {
      const decoded = decodeDrawFromUrl(hash);
      if (decoded && decoded.assignments && decoded.assignments.length > 0) {
        document.getElementById('setupSection').classList.add('hidden');
        document.getElementById('viewingBanner').classList.remove('hidden');
        renderResults(decoded.buyin, decoded.assignments, true);
        return;
      }
    }
    updateUI();
  });
</script>
</body>
</html>
